<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoWave 8D | Login & Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #f3f3f3; 
        }
    </style>
</head>
<body class="text-[#1a1a1a] min-h-screen flex flex-col justify-between overflow-x-hidden">

    <!-- Header Section -->
    <header class="w-full max-w-7xl mx-auto px-4 sm:px-6 py-4 sm:py-6 flex items-center justify-between z-10">
        <a href="/" class="flex items-center space-x-3">
            <i data-lucide="waves" class="w-8 h-8 text-[#ff2a85]"></i>
            <span class="text-2xl font-bold tracking-tight">EchoWave</span>
        </a>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-md mx-auto px-4 py-8 flex-grow flex items-center justify-center">
        <div class="w-full bg-white border-2 border-black rounded-xl p-6 sm:p-8 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] relative transition-all">
            
            <!-- Auth Form Header Toggle -->
            <div class="flex border-b-2 border-black mb-6 text-center text-sm font-bold uppercase tracking-wider">
                <button id="tab-login" class="flex-1 pb-3 border-b-4 border-[#ff2a85] text-[#1a1a1a]" onclick="toggleAuth('login')">
                    Login
                </button>
                <button id="tab-register" class="flex-1 pb-3 border-b-4 border-transparent text-gray-400 hover:text-[#1a1a1a]" onclick="toggleAuth('register')">
                    Register
                </button>
            </div>

            <!-- Login Container Form -->
            <form id="form-login" class="space-y-4" onsubmit="handleAuth(event, 'login')">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-gray-700">Email Address</label>
                    <input type="email" required class="w-full border-2 border-black p-3 rounded-lg focus:outline-none focus:border-[#ff2a85] text-sm" placeholder="YOU@EXAMPLE.COM">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-gray-700">Password</label>
                    <input type="password" required class="w-full border-2 border-black p-3 rounded-lg focus:outline-none focus:border-[#ff2a85] text-sm" placeholder="••••••••">
                </div>
                <div class="text-right">
                    <a href="#" class="text-xs font-bold uppercase text-[#ff2a85] hover:underline">Forgot Password?</a>
                </div>
                <button type="submit" class="w-full bg-[#ff2a85] text-white font-bold py-3 rounded-lg border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] hover:bg-[#e02073] active:translate-y-[1px] active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] text-sm uppercase tracking-wider transition-all mt-2">
                    Enter Dashboard
                </button>
            </form>

            <!-- Register Container Form -->
            <form id="form-register" class="space-y-4 hidden" onsubmit="handleAuth(event, 'register')">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-gray-700">Username</label>
                    <input type="text" id="reg-username" required class="w-full border-2 border-black p-3 rounded-lg focus:outline-none focus:border-[#ff2a85] text-sm" placeholder="SOUNDWAVE_99">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-gray-700">Email Address</label>
                    <input type="email" id="reg-email" required class="w-full border-2 border-black p-3 rounded-lg focus:outline-none focus:border-[#ff2a85] text-sm" placeholder="YOU@EXAMPLE.COM">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider mb-1 text-gray-700">Password</label>
                    <input type="password" id="reg-password" required class="w-full border-2 border-black p-3 rounded-lg focus:outline-none focus:border-[#ff2a85] text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-black text-white font-bold py-3 rounded-lg border-2 border-black shadow-[3px_3px_0px_0px_rgba(0,0,0,1)] hover:bg-gray-800 active:translate-y-[1px] active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] text-sm uppercase tracking-wider transition-all mt-2">
                    Create Free Account
                </button>
            </form>

            <!-- Notification Banner inside the form container -->
            <div id="auth-status" class="hidden mt-4 p-3 border-2 border-black rounded-lg text-xs font-bold uppercase tracking-wider text-center"></div>

        </div>
    </main>

    <!-- Footer Status Banner -->
    <footer class="w-full max-w-7xl mx-auto px-4 sm:px-6 py-4 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-2 text-xs font-bold text-gray-400 tracking-wider text-center sm:text-left">
        <div>SECURE ACCESS PROTOCOL</div>
        <div class="text-[#ff2a85]">ECHOWAVE CLIENT v1.0</div>
    </footer>

    <script>
        lucide.createIcons();

        // Tabs switcher function
        function toggleAuth(mode) {
            const loginForm = document.getElementById('form-login');
            const registerForm = document.getElementById('form-register');
            const loginTab = document.getElementById('tab-login');
            const registerTab = document.getElementById('tab-register');
            const statusDisplay = document.getElementById('auth-status');
            
            statusDisplay.classList.add('hidden');

            if (mode === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = "flex-1 pb-3 border-b-4 border-[#ff2a85] text-[#1a1a1a]";
                registerTab.className = "flex-1 pb-3 border-b-4 border-transparent text-gray-400 hover:text-[#1a1a1a]";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.className = "flex-1 pb-3 border-b-4 border-transparent text-gray-400 hover:text-[#1a1a1a]";
                registerTab.className = "flex-1 pb-3 border-b-4 border-black text-[#1a1a1a]";
            }
        }

        async function handleAuth(event, type) {
    event.preventDefault();
    const statusDisplay = document.getElementById('auth-status');
    statusDisplay.classList.remove('hidden', 'bg-green-100', 'bg-red-100', 'text-green-700', 'text-red-700');
    statusDisplay.innerText = "PROCESSING SECURE REQUEST...";

    const endpoint = type === 'register' ? '/register' : '/login';

    let payload;
    if (type === 'register') {
        payload = {
            username: document.getElementById('reg-username').value,
            email: document.getElementById('reg-email').value,
            password: document.getElementById('reg-password').value
        };
    } else {
        const form = document.getElementById('form-login');
        payload = {
            email: form.querySelector('input[type="email"]').value,
            password: form.querySelector('input[type="password"]').value
        };
    }

    try {
        const response = await fetch(`http://127.0.0.1:8000${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!data.success) {
            statusDisplay.classList.add('bg-red-100', 'text-red-700');
            statusDisplay.innerText = data.message.toUpperCase();
            return;
        }

        statusDisplay.classList.add('bg-green-100', 'text-green-700');

        if (type === 'register') {
            statusDisplay.innerText = "ACCOUNT CREATED! SWITCHING TO LOGIN...";
            setTimeout(() => toggleAuth('login'), 1500);
        } else {
            // Persist a lightweight session client-side
            localStorage.setItem('echowave_user', JSON.stringify({
                user_id: data.user_id,
                username: data.username
            }));
            statusDisplay.innerText = "ACCESS GRANTED. REDIRECTING...";
            setTimeout(() => window.location.href = "/index.html", 1000);
        }
    } catch (err) {
        console.error(err);
        statusDisplay.classList.add('bg-red-100', 'text-red-700');
        statusDisplay.innerText = "NETWORK ERROR. TRY AGAIN.";
    }
}
    </script>
</body>
</html>
